<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Self-Improving Runner Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { display: block; margin: 0 auto; }
#ui {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 10px 20px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(10,10,26,0.85);
  z-index: 10;
  font-size: 14px;
}
#ui .score { font-size: 28px; font-weight: bold; color: #0ff; }
#ui .gen { color: #f0a; }
#ui .info { color: #8f8; }
#controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 20px;
  background: rgba(10,10,26,0.9);
  display: flex; gap: 10px; align-items: center; justify-content: center;
  z-index: 10;
}
button {
  background: #1a1a3a; color: #0ff; border: 1px solid #0ff;
  padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px;
  border-radius: 4px;
}
button:hover { background: #0ff; color: #0a0a1a; }
button.active { background: #0ff; color: #0a0a1a; }
#log {
  position: fixed; right: 10px; top: 50px; width: 280px; bottom: 50px;
  background: rgba(10,10,26,0.9); border: 1px solid #333;
  padding: 8px; overflow-y: auto; font-size: 11px; z-index: 10;
  border-radius: 4px;
}
#log .keep { color: #0f0; }
#log .discard { color: #666; }
#log .header { color: #f0a; font-weight: bold; margin-bottom: 4px; }
#progress-bar {
  position: fixed; left: 10px; top: 50px; width: 200px;
  background: rgba(10,10,26,0.9); border: 1px solid #333;
  padding: 8px; z-index: 10; border-radius: 4px; font-size: 11px;
}
.bar-fill { height: 6px; background: #0ff; border-radius: 3px; transition: width 0.3s; }
.bar-bg { height: 6px; background: #222; border-radius: 3px; margin-top: 4px; }
</style>
</head>
<body>
<div id="ui">
  <div>
    <span class="gen" id="gen-display">Gen 0 (Baseline)</span>
  </div>
  <div>
    <span class="score" id="score-display">Score: 0</span>
  </div>
  <div>
    <span class="info" id="speed-display">Speed: 5.0</span>
  </div>
</div>

<div id="progress-bar">
  <div class="header" style="color: #0ff;">Evolution Progress</div>
  <div>Best mean: <span id="best-mean">0</span></div>
  <div>Target: 50+ all games</div>
  <div class="bar-bg"><div class="bar-fill" id="progress-fill" style="width: 0%"></div></div>
  <div style="margin-top:6px;">Games >=50: <span id="pct50">0%</span></div>
</div>

<div id="log">
  <div class="header">Evolution Log</div>
</div>

<div id="controls">
  <button id="btn-start" class="active">Start Evolution</button>
  <button id="btn-pause">Pause</button>
  <button id="btn-speed1">1x</button>
  <button id="btn-speed5">5x</button>
  <button id="btn-speed20">20x</button>
  <button id="btn-watch">Watch Best AI</button>
</div>

<canvas id="game"></canvas>

<script>
// ============================================================
// Game Engine (mirrors Python version)
// ============================================================
class Obstacle {
  constructor(x, width, height, type, speedMult = 1.0) {
    this.x = x; this.width = width; this.height = height;
    this.type = type; this.speedMult = speedMult;
  }
}

class RunnerGame {
  constructor(seed) {
    this.rng = this.makeRng(seed || 0);
    this.playerX = 50; this.playerY = 0; this.playerVy = 0;
    this.playerW = 20; this.playerH = 40;
    this.jumping = false; this.ducking = false; this.canDJ = true;
    this.score = 0; this.distance = 0; this.speed = 5;
    this.baseSpeed = 5; this.gravity = -0.8; this.jumpPower = 13;
    this.gameOver = false; this.tick = 0;
    this.obstacles = [];
    this.generateObstacles();
  }

  makeRng(seed) {
    // Simple seeded RNG (mulberry32)
    let s = seed | 0;
    return () => { s |= 0; s = s + 0x6D2B79F5 | 0;
      let t = Math.imul(s ^ s >>> 15, 1 | s);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296; };
  }

  rngUniform(a, b) { return a + this.rng() * (b - a); }
  rngChoice(arr) { return arr[Math.floor(this.rng() * arr.length)]; }
  rngWeighted(items, weights) {
    let sum = weights.reduce((a, b) => a + b, 0);
    let r = this.rng() * sum, acc = 0;
    for (let i = 0; i < items.length; i++) { acc += weights[i]; if (r < acc) return items[i]; }
    return items[items.length - 1];
  }

  generateObstacles() {
    let x = 250;
    for (let i = 0; i < 200; i++) {
      let p = Math.min(i / 80, 1);
      let type;
      if (i < 8) type = 'ground';
      else if (i < 20) type = this.rngChoice(['ground', 'ground', 'low']);
      else type = this.rngWeighted(['ground', 'low', 'high'],
        [0.35 - 0.1*p, 0.35, 0.30 + 0.1*p]);

      let w, h;
      if (type === 'ground') { w = this.rngUniform(15, 25+8*p); h = this.rngUniform(20, 35+15*p); }
      else if (type === 'low') { w = this.rngUniform(20, 30+10*p); h = this.rngUniform(15, 28); }
      else { w = this.rngUniform(20, 30); h = this.rngUniform(22, 30); }

      let minG = Math.max(100, 180 - 80*p), maxG = Math.max(150, 280 - 100*p);
      let gap = this.rngUniform(minG, maxG);
      let sm = 1.0;
      if (i > 25 && this.rng() < 0.12*p) sm = this.rngUniform(1.05, 1.2+0.15*p);

      this.obstacles.push(new Obstacle(x, w, h, type, sm));
      x += w + gap;
    }
  }

  getNextObs() {
    let px = this.distance + this.playerX;
    for (let o of this.obstacles) if (o.x + o.width > px) return o;
    return null;
  }

  step(action) {
    if (this.gameOver) return this.info();
    this.tick++;
    this.speed = this.baseSpeed + Math.min(this.score * 0.02, 2.5);
    let next = this.getNextObs();
    if (next) this.speed *= next.speedMult;

    if (action === 'jump' && !this.jumping) {
      this.playerVy = this.jumpPower; this.jumping = true;
      this.canDJ = true; this.ducking = false; this.playerH = 40;
    } else if (action === 'double_jump' && this.jumping && this.canDJ && this.playerY > 3) {
      this.playerVy = this.jumpPower * 0.75; this.canDJ = false;
    } else if (action === 'duck' && !this.jumping) {
      this.ducking = true; this.playerH = 20;
    } else if (action === 'none' && this.ducking) {
      this.ducking = false; this.playerH = 40;
    }

    if (this.jumping) {
      this.playerVy += this.gravity; this.playerY += this.playerVy;
      if (this.playerY <= 0) {
        this.playerY = 0; this.playerVy = 0; this.jumping = false; this.canDJ = true;
        this.playerH = this.ducking ? 20 : 40;
      }
    }

    this.distance += this.speed;
    let pl = this.distance + this.playerX, pr = pl + this.playerW;
    let pt = this.playerY + this.playerH;

    for (let o of this.obstacles) {
      if (o.x > pr + 10) break;
      if (o.x + o.width < pl) continue;
      if (o.type === 'high') {
        if (pt > o.height && this.playerY < o.height) { this.gameOver = true; return this.info(); }
      } else {
        if (this.playerY < o.height) { this.gameOver = true; return this.info(); }
      }
    }

    let sc = 0;
    for (let o of this.obstacles) { if (o.x + o.width < pl) sc++; else break; }
    this.score = sc;
    return this.info();
  }

  info() {
    let next = this.getNextObs();
    return {
      score: this.score, distance: this.distance,
      playerY: this.playerY, playerVy: this.playerVy,
      jumping: this.jumping, ducking: this.ducking, canDJ: this.canDJ,
      speed: this.speed, gameOver: this.gameOver, tick: this.tick,
      nextType: next ? next.type : null,
      nextDist: next ? next.x - this.distance - this.playerX : 999,
      nextH: next ? next.height : 0, nextW: next ? next.width : 0,
    };
  }
}

// ============================================================
// AI Player
// ============================================================
class Strategy {
  constructor(params = {}) {
    this.jumpTrigger = params.jumpTrigger ?? 85;
    this.jumpMaxDist = params.jumpMaxDist ?? 140;
    this.emergencyDist = params.emergencyDist ?? 15;
    this.speedFactor = params.speedFactor ?? 2.5;
    this.djHeightFrac = params.djHeightFrac ?? 0.9;
    this.djMinTicks = params.djMinTicks ?? 6;
    this.djMaxDist = params.djMaxDist ?? 80;
    this.duckTrigger = params.duckTrigger ?? 90;
    this.duckRelease = params.duckRelease ?? -25;
    this.duckSpeedFactor = params.duckSpeedFactor ?? 1.5;
  }

  mutate(rng, rate = 0.3, strength = 0.15) {
    let n = new Strategy(this);
    const bounds = {
      jumpTrigger: [30, 200], jumpMaxDist: [60, 300], emergencyDist: [5, 50],
      speedFactor: [0, 8], djHeightFrac: [0.3, 1.5], djMinTicks: [2, 15],
      djMaxDist: [30, 150], duckTrigger: [40, 200], duckRelease: [-60, 0],
      duckSpeedFactor: [0, 5],
    };
    for (let [k, [lo, hi]] of Object.entries(bounds)) {
      if (rng() < rate) {
        let v = n[k];
        if (k === 'djMinTicks') v = Math.max(lo, Math.min(hi, v + Math.floor((rng()-0.5)*5)));
        else v = Math.max(lo, Math.min(hi, v + gaussRng(rng) * strength * (hi - lo)));
        n[k] = v;
      }
    }
    return n;
  }
}

function gaussRng(rng) {
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

class AIPlayer {
  constructor(strategy) { this.s = strategy; this.jumpTick = -100; }
  decide(info, game) {
    if (info.gameOver) return 'none';
    let { nextType: t, nextDist: d, nextH: h, speed, playerY: y,
          jumping, ducking, canDJ, tick } = info;
    if (!t) return 'none';
    let adjJ = this.s.jumpTrigger + speed * this.s.speedFactor;
    let adjD = this.s.duckTrigger + speed * this.s.duckSpeedFactor;

    if (t === 'high') {
      if (!jumping && d < adjD && d > this.s.duckRelease) return 'duck';
      if (ducking && d < this.s.duckRelease) return 'none';
      if (ducking) return 'duck';
      return 'none';
    }

    if (!jumping) {
      if (d < adjJ && d > this.s.emergencyDist) { this.jumpTick = tick; return 'jump'; }
      if (d < this.s.emergencyDist && d > 0) { this.jumpTick = tick; return 'jump'; }
    }
    if (jumping && canDJ) {
      if (tick - this.jumpTick >= this.s.djMinTicks && d < this.s.djMaxDist) {
        if (y < h * this.s.djHeightFrac) return 'double_jump';
      }
    }
    return 'none';
  }
}

// ============================================================
// Evolution Engine
// ============================================================
function playGame(strategy, seed) {
  let game = new RunnerGame(seed);
  let player = new AIPlayer(strategy);
  let info = game.info();
  while (!info.gameOver && info.tick < 50000) {
    info = game.step(player.decide(info, game));
  }
  return info.score;
}

function evalStrategy(strategy, seeds) {
  let scores = seeds.map(s => playGame(strategy, s));
  return {
    mean: scores.reduce((a,b) => a+b, 0) / scores.length,
    min: Math.min(...scores), max: Math.max(...scores),
    scores, allAbove50: scores.every(s => s >= 50),
    pct50: scores.filter(s => s >= 50).length / scores.length * 100,
  };
}

// ============================================================
// Rendering
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, groundY;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H - 100;
}
window.addEventListener('resize', resize);
resize();

const COLORS = {
  ground: '#2a2a4a', sky: '#0a0a1a',
  player: '#0ff', playerDuck: '#0aa',
  obsGround: '#f44', obsLow: '#fa0', obsHigh: '#a0f',
  trail: 'rgba(0,255,255,0.03)',
};

function drawGame(game, info) {
  // Sky gradient
  let grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050515');
  grad.addColorStop(1, '#0a0a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  let rng = game.makeRng(12345);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 60; i++) {
    ctx.fillRect(rng()*W, rng()*groundY, 1.5, 1.5);
  }

  // Ground
  ctx.fillStyle = '#1a1a3a';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();

  // Grid lines on ground
  ctx.strokeStyle = 'rgba(0,255,255,0.05)';
  for (let i = 0; i < 20; i++) {
    let x = ((i * 80 - game.distance * 0.5) % (W + 80) + W + 80) % (W + 80) - 40;
    ctx.beginPath(); ctx.moveTo(x, groundY); ctx.lineTo(x, H); ctx.stroke();
  }

  let camX = game.distance;
  let scale = 2.0;

  // Obstacles
  for (let obs of game.obstacles) {
    let sx = (obs.x - camX) * scale / 2 + 50;
    if (sx > W + 50 || sx + obs.width * scale < -50) continue;

    let sw = obs.width * scale / 2;
    if (obs.type === 'high') {
      // High obstacle: hanging bar
      ctx.fillStyle = COLORS.obsHigh;
      let clearH = obs.height * scale / 2;
      ctx.fillRect(sx, 0, sw, groundY - clearH);
      ctx.fillStyle = 'rgba(160,0,255,0.3)';
      ctx.fillRect(sx, groundY - clearH, sw, clearH);
      // Label
      ctx.fillStyle = '#a0f';
      ctx.font = '9px monospace';
      ctx.fillText('DUCK', sx + 2, groundY - clearH + 12);
    } else {
      let sh = obs.height * scale / 2;
      ctx.fillStyle = obs.type === 'ground' ? COLORS.obsGround : COLORS.obsLow;
      ctx.fillRect(sx, groundY - sh, sw, sh);
      // Glow
      ctx.shadowColor = obs.type === 'ground' ? '#f44' : '#fa0';
      ctx.shadowBlur = 8;
      ctx.fillRect(sx, groundY - sh, sw, 2);
      ctx.shadowBlur = 0;
    }
  }

  // Player
  let px = 50 + game.playerX * scale / 2;
  let py = groundY - game.playerY * scale / 2;
  let pw = game.playerW * scale / 2;
  let ph = game.playerH * scale / 2;

  // Trail
  ctx.fillStyle = COLORS.trail;
  for (let i = 1; i <= 8; i++) {
    ctx.fillRect(px - i * 4, py - ph, pw, ph);
  }

  // Player body
  ctx.fillStyle = game.ducking ? COLORS.playerDuck : COLORS.player;
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 15;
  ctx.fillRect(px, py - ph, pw, ph);
  ctx.shadowBlur = 0;

  // Eyes
  ctx.fillStyle = '#000';
  let eyeY = py - ph + ph * 0.25;
  ctx.fillRect(px + pw * 0.5, eyeY, 3, 3);
  ctx.fillRect(px + pw * 0.75, eyeY, 3, 3);

  // Jump indicator
  if (game.jumping) {
    ctx.strokeStyle = 'rgba(0,255,255,0.4)';
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(px + pw/2, py); ctx.lineTo(px + pw/2, groundY); ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ============================================================
// Main Loop
// ============================================================
let state = 'idle'; // idle, evolving, watching
let evolveSpeed = 1;
let currentGen = 0;
let bestStrategy = new Strategy();
let bestMean = 0;
let evolveRng;
let evolveSeeds;
let evolvePlateau = 0;
let watchGame = null, watchPlayer = null, watchInfo = null;

const logEl = document.getElementById('log');
const genEl = document.getElementById('gen-display');
const scoreEl = document.getElementById('score-display');
const speedEl = document.getElementById('speed-display');
const bestMeanEl = document.getElementById('best-mean');
const pct50El = document.getElementById('pct50');
const progressFill = document.getElementById('progress-fill');

function addLog(text, cls = '') {
  let d = document.createElement('div');
  d.className = cls;
  d.textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function evolveStep() {
  if (state !== 'evolving') return;

  currentGen++;
  let rate = 0.3, strength = 0.15;
  if (evolvePlateau > 15) { rate = 0.8; strength = 0.4; }
  else if (evolvePlateau > 8) { rate = 0.5; strength = 0.25; }

  let candidate = bestStrategy.mutate(evolveRng, rate, strength);
  let result = evalStrategy(candidate, evolveSeeds);

  if (result.mean > bestMean) {
    let delta = result.mean - bestMean;
    bestMean = result.mean;
    bestStrategy = candidate;
    evolvePlateau = 0;
    addLog(`Gen ${currentGen}: mean=${result.mean.toFixed(1)} min=${result.min} [KEEP +${delta.toFixed(1)}]`, 'keep');
  } else {
    evolvePlateau++;
    addLog(`Gen ${currentGen}: mean=${result.mean.toFixed(1)} min=${result.min} [discard]`, 'discard');
  }

  genEl.textContent = `Gen ${currentGen}`;
  bestMeanEl.textContent = bestMean.toFixed(1);
  pct50El.textContent = result.pct50.toFixed(0) + '%';
  progressFill.style.width = Math.min(100, (bestMean / 50) * 100) + '%';

  if (result.allAbove50 && result.mean >= bestMean) {
    addLog(`TARGET REACHED! All games >= 50 at gen ${currentGen}`, 'keep');
    addLog(`Scores: ${result.scores.join(', ')}`, 'keep');
    // Keep evolving for better scores
  }
}

function startWatch() {
  state = 'watching';
  watchGame = new RunnerGame(Math.floor(Math.random() * 1000));
  watchPlayer = new AIPlayer(bestStrategy);
  watchInfo = watchGame.info();
  genEl.textContent = `Watching Best AI (Gen ${currentGen})`;
}

function renderLoop() {
  if (state === 'evolving') {
    for (let i = 0; i < evolveSpeed; i++) evolveStep();
    // Show a quick game visualization during evolution
    if (!watchGame || watchGame.gameOver) {
      watchGame = new RunnerGame(currentGen % 100);
      watchPlayer = new AIPlayer(bestStrategy);
      watchInfo = watchGame.info();
    }
    for (let i = 0; i < 3; i++) {
      if (!watchInfo.gameOver) {
        watchInfo = watchGame.step(watchPlayer.decide(watchInfo, watchGame));
      }
    }
    drawGame(watchGame, watchInfo);
    scoreEl.textContent = `Score: ${watchInfo.score}`;
    speedEl.textContent = `Speed: ${watchInfo.speed.toFixed(1)}`;
  } else if (state === 'watching') {
    if (!watchInfo.gameOver) {
      watchInfo = watchGame.step(watchPlayer.decide(watchInfo, watchGame));
      drawGame(watchGame, watchInfo);
      scoreEl.textContent = `Score: ${watchInfo.score}`;
      speedEl.textContent = `Speed: ${watchInfo.speed.toFixed(1)}`;
    } else {
      scoreEl.textContent = `Final Score: ${watchInfo.score}`;
      // Auto-restart after 2s
      setTimeout(() => { if (state === 'watching') startWatch(); }, 2000);
    }
  } else {
    // Idle: just draw empty
    drawGame(new RunnerGame(0), {});
  }
  requestAnimationFrame(renderLoop);
}

// Controls
document.getElementById('btn-start').onclick = () => {
  state = 'evolving';
  currentGen = 0; bestMean = 0; evolvePlateau = 0;
  bestStrategy = new Strategy();
  evolveRng = (() => { let s = 42; return () => { s|=0; s=s+0x6D2B79F5|0;
    let t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296; }; })();
  evolveSeeds = Array.from({length: 15}, (_, i) => i);
  logEl.innerHTML = '<div class="header">Evolution Log</div>';
  let base = evalStrategy(bestStrategy, evolveSeeds);
  bestMean = base.mean;
  addLog(`Baseline: mean=${base.mean.toFixed(1)} min=${base.min} max=${base.max}`, 'keep');
  addLog(`Scores: ${base.scores.join(', ')}`, '');
};

document.getElementById('btn-pause').onclick = () => {
  state = state === 'evolving' ? 'idle' : 'evolving';
};

document.getElementById('btn-speed1').onclick = () => { evolveSpeed = 1; };
document.getElementById('btn-speed5').onclick = () => { evolveSpeed = 5; };
document.getElementById('btn-speed20').onclick = () => { evolveSpeed = 20; };

document.getElementById('btn-watch').onclick = () => startWatch();

requestAnimationFrame(renderLoop);
</script>
</body>
</html>
